name: CD Infrastructure (Deploy)

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'

jobs:
  deploy_infra:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: ☁️ Configurar Credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: 🌐 Obtener IP del Runner
        id: ip
        run: echo "ipv4=$(curl -s http://checkip.amazonaws.com)" >> $GITHUB_OUTPUT

      - name: 🏗️ Configurar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.0"

      - name: 🔧 Inicializar Terraform
        working-directory: ./terraform/environments/dev
        run: terraform init

      - name: 🚀 Terraform Apply
        working-directory: ./terraform/environments/dev
        env:
          TF_VAR_my_ip: ${{ steps.ip.outputs.ipv4 }}
        run: terraform apply -auto-approve
